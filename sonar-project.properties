sonar.projectKey=contact-management-system
sonar.projectName=Contact Management System
sonar.projectVersion=0.1.0
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.sourceEncoding=UTF-8

# Code quality thresholds
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Coverage rules (minimum 60% for this project)
sonar.coverage.exclusions=**/*Config.java,**/*Application.java
sonar.java.coveragePlugin=jacoco

# Security rules
sonar.security.exitcode=1

# Rules to ignore (optional - set per project needs)
# sonar.exclusions=**/generated/**

# Logging
sonar.verbose=false
